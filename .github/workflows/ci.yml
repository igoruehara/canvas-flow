name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build backend
        run: npm run build

      - name: Audit production dependencies
        run: npm run audit:prod

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Audit production dependencies
        run: npm run audit:prod

  npm-package:
    name: npm Package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm_canvas_flow

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Validate launcher syntax
        run: node --check bin/canvas-flow.js

      - name: Validate package metadata
        run: |
          node -e "const p = require('./package.json'); if (!p.repository?.url || !p.homepage || !p.bugs?.url) throw new Error('Missing GitHub npm metadata'); console.log(p.name + '@' + p.version);"

      - name: Validate package contents
        run: npm pack --dry-run
